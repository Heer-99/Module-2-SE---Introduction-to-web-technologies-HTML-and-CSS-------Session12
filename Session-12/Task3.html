<!DOCTYPE html>
<html>
<head>
  <title>Flipkart Product Section</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      background:#f1f3f6;
    }

    .product-card{
      border:none;
      border-radius:10px;
      transition:0.3s;
      height:100%;
      background:white;
    }

    .product-card:hover{
      transform:scale(1.03);
      box-shadow:0 6px 18px rgba(0,0,0,0.15);
    }

    .product-img{
      height:180px;
      object-fit:contain;
      padding:10px;
    }

    .price{
      font-weight:bold;
      color:#388e3c;
    }

    .rating{
      background:#388e3c;
      color:white;
      font-size:12px;
      padding:2px 6px;
      border-radius:4px;
    }

    .offer{
      position:absolute;
      top:10px;
      left:10px;
      background:#ff6161;
      color:white;
      font-size:11px;
      padding:3px 6px;
      border-radius:4px;
    }
  </style>
</head>

<body>

<div class="container py-4">
  <h4 class="mb-3">🔥 Flipkart Style Products</h4>

  <div class="row g-3">

    <!-- 1 -->
    <div class="col-6 col-md-3">
      <div class="card product-card position-relative">
        <span class="offer">20% OFF</span>
        <img class="product-img card-img-top"
          src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=500">

        <div class="card-body">
          <h6>Smartphone</h6>
          <span class="rating">4.3 ★</span>
          <p class="price mt-2">₹12,999</p>
        </div>
      </div>
    </div>

    <!-- 2 -->
    <div class="col-6 col-md-3">
      <div class="card product-card position-relative">
        <span class="offer">15% OFF</span>
        <img class="product-img card-img-top"
          src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500">

        <div class="card-body">
          <h6>Headphones</h6>
          <span class="rating">4.1 ★</span>
          <p class="price mt-2">₹1,999</p>
        </div>
      </div>
    </div>

    <!-- 3 -->
    <div class="col-6 col-md-3">
      <div class="card product-card position-relative">
        <span class="offer">30% OFF</span>
        <img class="product-img card-img-top"
          src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500">

        <div class="card-body">
          <h6>Smart Watch</h6>
          <span class="rating">4.5 ★</span>
          <p class="price mt-2">₹2,499</p>
        </div>
      </div>
    </div>

    <!-- 4 -->
    <div class="col-6 col-md-3">
      <div class="card product-card position-relative">
        <span class="offer">10% OFF</span>
        <img class="product-img card-img-top"
          src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=500">

        <div class="card-body">
          <h6>Laptop</h6>
          <span class="rating">4.6 ★</span>
          <p class="price mt-2">₹45,999</p>
        </div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
